<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Prueba de HTML con FireBase</title>
</head>

<body>

    <h1>Registro de Usuarios</h1>
    <input type="text" id="username" placeholder="Ingrese su nombre de usuario">

    <button onclick="guardar()">
        Registrar
    </button>
    <button onclick="mostrar()">Mostrar Registros</button>

    <hr>
    <div id="resuldatos"></div>

    <script type="module">
        // IMPORTACIONES ÚNICAS (Solo una vez desde la CDN web)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // Tus llaves del proyecto "prueba-956df"
        const firebaseConfig = {
            apiKey: "AIzaSyChmIunfHmTJzMUGBnNHFKedA783tKoXTQ",
            authDomain: "prueba-956df.firebaseapp.com",
            databaseURL: "https://prueba-956df-default-rtdb.firebaseio.com",
            projectId: "prueba-956df",
            storageBucket: "prueba-956df.firebasestorage.app",
            messagingSenderId: "29143147624",
            appId: "1:29143147624:web:84f8d9af6489cd9c9207dd"
        };

        // INICIALIZACIÓN ÚNICA
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Función para registrar en Firestore
        window.guardar = async function () {
            const usernameValue = document.getElementById('username').value;

            if (!usernameValue.trim()) {
                alert('Por favor, ingrese un nombre de usuario.');
                return;
            }

            try {
                await addDoc(collection(db, 'usuarios'), {
                    username: usernameValue
                });
                alert('¡Usuario registrado con éxito!');
                document.getElementById('username').value = ''; // Limpia el campo
            }
            catch (error) {
                console.error(error);
                alert('Error al guardar registro: ' + error.message);
            }
        }

        // Función para consultar de Firestore
        window.mostrar = async function () {
            try {
                const querySnapshot = await getDocs(collection(db, 'usuarios'));
                const resuldatos = document.getElementById('resuldatos');
                resuldatos.innerHTML = '';

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    resuldatos.innerHTML += `<p>${data.username}</p>`;
                });
            } catch (error) {
                console.error(error);
                alert('Error al consultar registros: ' + error.message);
            }
        }
    </script>

</body>

</html>
